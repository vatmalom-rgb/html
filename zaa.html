<!DOCTYPE html>
<html>
<head>
    <title>Pizza Form Simple</title>
</head>
<body>

    <table border="1" cellpadding="10" cellspacing="0">
        
        <tr>
            <th colspan="2">Pizza Shop 2.0</th>
        </tr>

        <tr>
            <td>Name</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Pizza Topping</td>
            <td>
                <input type="radio" name="top"> Supreme <br>
                <input type="radio" name="top"> Vegetarian <br>
                <input type="radio" name="top"> Hawaiian
            </td>
        </tr>

        <tr>
            <td>Pizza Sauce</td>
            <td>
                <select>
                    <option>Tomato</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Optional Extras</td>
            <td>
                <input type="checkbox"> Extra Cheese
                <input type="checkbox"> Gluten Free Base
            </td>
        </tr>

        <tr>
            <td colspan="2">
                Delivery Instructions: <br>
                <textarea rows="4" cols="40"></textarea>
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <input type="submit" value="Send my Order">
            </td>
        </tr>

    </table>

</body>
</html>
